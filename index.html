<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonds Vert — Cartographie des projets en Provence-Alpes-Côte d'Azur</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.5}
.skip-link{position:absolute;top:-100px;left:8px;z-index:10000;background:#000091;color:#fff;padding:8px 16px;font-size:14px;font-weight:600;text-decoration:none;border-radius:0 0 4px 4px}
.skip-link:focus{top:0}
#map{width:100%;height:100vh}
.header-bar{position:absolute;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:3px solid #000091;padding:12px 24px;display:flex;align-items:center;gap:16px;pointer-events:none}
.header-bar h1{font-size:18px;font-weight:700;color:#000091;letter-spacing:-0.3px}
.header-bar .subtitle{font-size:13px;color:#666;font-weight:400}
.filters-panel{position:absolute;top:64px;left:16px;z-index:1000;background:#fff;border:1px solid #ddd;border-radius:6px;padding:14px;width:260px;max-height:calc(100vh - 90px);overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.filters-panel h2{font-size:13px;font-weight:700;color:#000091;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #000091}
.filter-section{margin-bottom:14px}
.filter-section h3{font-size:12px;font-weight:600;color:#333;margin-bottom:6px}
.filter-group{display:flex;flex-direction:column;gap:3px}
.dept-btn{display:block;width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#333;font-size:12px;font-family:inherit;cursor:pointer;text-align:left;transition:all .15s}
.dept-btn:hover{background:#f0f0f0;border-color:#000091}
.dept-btn:focus{outline:2px solid #000091;outline-offset:1px}
.dept-btn.active{background:#000091;color:#fff;border-color:#000091}
.filter-cb{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;transition:background .15s;font-size:12px;color:#333}
.filter-cb:hover{background:#f0f0f0}
.filter-cb input[type="checkbox"]{width:16px;height:16px;accent-color:#000091;cursor:pointer;flex-shrink:0}
.filter-cb .color-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15)}
.filter-reset{display:inline-block;margin-top:4px;padding:4px 10px;background:#f5f5f5;border:1px solid #ccc;border-radius:4px;font-size:11px;color:#555;cursor:pointer;font-family:inherit}
.filter-reset:hover{background:#e8e8e8}
.stats-panel{position:absolute;top:64px;right:16px;z-index:1000;background:#fff;border:1px solid #ddd;border-radius:6px;padding:14px;width:230px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.stats-panel h2{font-size:13px;font-weight:700;color:#000091;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #000091}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.stat-label{font-size:12px;color:#555}
.stat-value{font-size:14px;font-weight:700;color:#000091}
.stat-sep{border-top:1px solid #eee;margin:8px 0}
.stat-sub{font-size:11px;color:#888;margin-bottom:4px}
.legend-sizes{display:flex;align-items:flex-end;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.legend-size-item{text-align:center}
.legend-size-circle{border:2px solid #888;border-radius:50%;margin:0 auto 2px;background:transparent}
.legend-size-label{font-size:10px;color:#888}
.leaflet-popup-content-wrapper{background:#fff!important;border-radius:6px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important;border:1px solid #ddd!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{color:#1a1a1a!important;font-family:inherit!important;margin:12px 16px!important;line-height:1.5!important}
.popup-title{font-size:15px;font-weight:700;color:#000091;margin-bottom:4px}
.popup-dept{font-size:12px;color:#666;margin-bottom:8px}
.popup-stat{display:flex;justify-content:space-between;margin-bottom:3px}
.popup-stat-label{font-size:12px;color:#666}
.popup-stat-value{font-size:13px;font-weight:700;color:#000091}
.popup-evol{font-size:11px;color:#888;margin-top:6px;padding-top:6px;border-top:1px dashed #ddd}
.popup-evol-up{color:#2e7d32;font-weight:600}
.popup-evol-down{color:#c62828;font-weight:600}
.popup-evol-new{color:#000091;font-weight:600}
.popup-proj{font-size:11px;color:#555;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.popup-proj-item{margin-bottom:5px}
.popup-proj-name{color:#333}
.popup-proj-amount{color:#e1000f;font-weight:600}
.popup-toggle{display:inline-block;margin-top:6px;padding:3px 8px;background:#f0f0f5;border:1px solid #ddd;border-radius:4px;font-size:11px;color:#000091;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.popup-toggle:hover{background:#e0e0f0;border-color:#000091}
.popup-extra{display:none}
.popup-extra.open{display:block}
.leaflet-control-zoom a{background:#fff!important;color:#333!important;border-color:#ddd!important}
.leaflet-control-zoom a:hover{background:#f0f0f0!important}
.leaflet-control-attribution{background:rgba(255,255,255,.85)!important;font-size:10px!important}
.dept-label{background:none!important;border:none!important;box-shadow:none!important;font-size:11px;font-weight:600;color:#555;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;white-space:nowrap}
.year-btn{padding:4px 12px;border:1px solid #000091;border-radius:4px;background:#fff;color:#000091;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.year-btn:hover{background:#f0f0f5}
.year-btn.active{background:#000091;color:#fff}
.mode-toggle{display:flex;border:1px solid #ddd;border-radius:4px;overflow:hidden;margin-bottom:10px}
.mode-toggle button{flex:1;padding:5px 0;border:none;background:#fff;color:#555;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.mode-toggle button:not(:last-child){border-right:1px solid #ddd}
.mode-toggle button.active{background:#000091;color:#fff}
.mode-toggle button:hover:not(.active){background:#f0f0f5}
.export-btn{display:block;width:100%;margin-top:10px;padding:6px 0;border:1px solid #000091;border-radius:4px;background:#fff;color:#000091;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center}
.export-btn:hover{background:#000091;color:#fff}
@media(max-width:768px){.filters-panel{width:200px;padding:10px;font-size:11px}.stats-panel{width:180px;padding:10px}.header-bar h1{font-size:15px}}
</style>
</head>
<body>
<a href="#map" class="skip-link">Aller au contenu principal</a>
<header class="header-bar" role="banner">
  <h1>Fonds Vert 2023+2024 — Provence-Alpes-Côte d'Azur</h1>
  <span class="subtitle" id="headerStats">1 154 projets · 294,5 M€ · 440 communes</span>
  <div style="display:flex;gap:4px;align-items:center;margin-left:auto;pointer-events:auto">
    <button class="year-btn" id="btn2023" onclick="switchYear(2023)">2023</button>
    <button class="year-btn" id="btn2024" onclick="switchYear(2024)">2024</button>
    <button class="year-btn active" id="btnBoth" onclick="switchYear('both')">2023+2024</button>

  </div>
</header>
<nav class="filters-panel" role="navigation" aria-label="Filtres de la carte">
  <h2>Filtres</h2>
  <div class="filter-section" style="margin-bottom:14px"><h3 style="font-size:12px;font-weight:600;color:#333;margin-bottom:6px">Rechercher</h3><div style="position:relative"><input type="text" id="searchInput" placeholder="projet, commune, bénéficiaire..." autocomplete="off" style="width:100%;padding:6px 10px 6px 28px;font-size:12px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#333;font-family:inherit"/><svg style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div></div>
  <div class="filter-section"><h3 id="dept-filter-label">Départements</h3><div class="filter-group" role="group" aria-labelledby="dept-filter-label" id="deptFilters" style="gap:4px;"></div></div>
  <div class="filter-section"><h3 id="mesure-filter-label">Mesures</h3><div class="filter-group" role="group" aria-labelledby="mesure-filter-label" id="mesureFilters"></div><button class="filter-reset" onclick="resetMesures()" aria-label="Réinitialiser les filtres de mesures">Tout afficher</button></div>
</nav>
<div id="searchResults" style="display:none;position:fixed;z-index:2000;background:#fff;border:1px solid #ddd;border-radius:4px;max-height:320px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);width:280px"></div>
<main><div id="map" role="application" aria-label="Carte interactive des projets Fonds Vert en PACA" tabindex="0"></div></main>
<aside class="stats-panel" role="complementary" aria-label="Statistiques">
  <h2>Statistiques</h2>
  <div class="mode-toggle" id="modeToggle">
    <button class="active" onclick="setMode('montant')">Montant total</button>
    <button onclick="setMode('habitant')">€ / habitant</button>
  </div>
  <div id="statsContent"></div>
  <button class="export-btn" onclick="exportCSV()">⬇ Exporter CSV</button>
</aside>
<script src="data.js"></script>
<script>
const MESURE_COLORS={"Rénov. énergétique":"#2f5496","Recyclage foncier":"#bf8f00","Renaturation":"#2e7d32","Éclairage public":"#7b1fa2","PAPI/GEMAPI":"#c62828","ZFE mobilité":"#ad1457","Incendies de forêt":"#e65100","Terr. Industrie":"#00838f","Biodéchets":"#558b2f","Covoiturage":"#00695c","Mobilités rurales":"#4527a0","Ingénierie":"#546e7a","Risques montagne":"#6a1b9a","Biodiversité":"#1b5e20","Trait de côte":"#0277bd"};
const DEPT_NAMES={"04":"Alpes-de-Haute-Provence","05":"Hautes-Alpes","06":"Alpes-Maritimes","13":"Bouches-du-Rhône","83":"Var","84":"Vaucluse"};
const DEPT_CENTROIDS={"04":[44.05,6.2],"05":[44.65,6.3],"06":[43.85,7.1],"13":[43.45,5.1],"83":[43.4,6.3],"84":[44.05,5.1]};
let activeDepts=new Set(Object.keys(DEPT_NAMES)),activeMesures=new Set(Object.keys(MESURE_COLORS)),circles=[],deptLabels=[];
let displayMode='montant'; // 'montant' or 'habitant' (dept level)

// Build lookup indexes for evolution
const IDX_2023=Object.fromEntries(DATA_2023.map(d=>[d.code,d]));
const IDX_2024=Object.fromEntries(DATA_2024.map(d=>[d.code,d]));

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1).replace('.',',')+"\u00a0M€";if(n>=1e3)return(n/1e3).toFixed(0)+"\u00a0k€";return Math.round(n)+"\u00a0€";}
function fmtHab(n){if(n>=1000)return(n/1000).toFixed(1).replace('.',',')+"\u00a0k€/hab";return Math.round(n)+"\u00a0€/hab";}
function getRadius(m,maxM){return 4+28*Math.pow(m/maxM,0.4);}
function getColor(m){return MESURE_COLORS[m]||"#999";}
const pacaBounds=L.latLngBounds([[42.9,4.15],[45.1,7.7]]);
const map=L.map('map',{zoomControl:false,attributionControl:true,maxBounds:pacaBounds.pad(0.05),maxBoundsViscosity:1.0,minZoom:7,maxZoom:15}).fitBounds(pacaBounds,{padding:[0,270]});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a> · Données : <a href="https://www.data.gouv.fr">data.gouv.fr</a>',maxZoom:18,subdomains:'abcd'}).addTo(map);
L.geoJSON(DEPTS_GEOJSON,{style:{color:'#000091',weight:2,opacity:0.6,fillColor:'transparent',fillOpacity:0,dashArray:'6,3'},onEachFeature:function(f,l){l.bindTooltip(f.properties.nom,{permanent:false,direction:'center',className:'dept-label'});}}).addTo(map);
Object.entries(DEPT_CENTROIDS).forEach(([c,ll])=>{const l=L.marker(ll,{icon:L.divIcon({className:'dept-label',html:DEPT_NAMES[c],iconSize:null}),interactive:false}).addTo(map);deptLabels.push(l);});
map.on('zoomend',function(){const z=map.getZoom();deptLabels.forEach(l=>{if(z>=10)map.removeLayer(l);else if(!map.hasLayer(l))l.addTo(map);});});

// Mode toggle
function setMode(mode){
  displayMode=mode;
  document.querySelectorAll('#modeToggle button').forEach(b=>b.classList.remove('active'));
  document.querySelector('#modeToggle button'+(mode==='montant'?':first-child':':last-child')).classList.add('active');
  renderCircles();
}

function buildEvolutionHtml(code){
  const d23=IDX_2023[code], d24=IDX_2024[code];
  if(!d23&&!d24) return '';
  if(!d23) return '<div class="popup-evol"><span class="popup-evol-new">Nouveau en 2024</span></div>';
  if(!d24) return '<div class="popup-evol"><span class="popup-evol-new">Financé en 2023 uniquement</span> · '+fmt(d23.montant)+'</div>';
  const diff=d24.montant-d23.montant;
  const pct=d23.montant>0?((d24.montant/d23.montant-1)*100):0;
  const cls=diff>=0?'popup-evol-up':'popup-evol-down';
  const arrow=diff>=0?'↗':'↘';
  return '<div class="popup-evol">2023→2024 : '+fmt(d23.montant)+' → '+fmt(d24.montant)+
    ' <span class="'+cls+'">'+arrow+' '+(pct>=0?'+':'')+pct.toFixed(0)+'%</span></div>';
}

function renderCircles(){
  circles.forEach(c=>map.removeLayer(c));circles=[];
  const filtered=DATA.filter(d=>activeDepts.has(d.code_dept)&&activeMesures.has(d.demarche_short));
  const maxM=filtered.length?Math.max(...filtered.map(d=>d.montant)):1;
  [...filtered].sort((a,b)=>a.montant-b.montant).forEach(d=>{
    const color=getColor(d.demarche_short),radius=getRadius(d.montant,maxM);
    const circle=L.circleMarker([d.lat,d.lng],{radius,fillColor:color,fillOpacity:0.5,color,weight:1.5,opacity:0.7}).addTo(map);
    // Popup content
    let ph='';
    if(d.projets&&d.projets.length>0){
      const uid='proj-'+d.code,f3=d.projets.slice(0,3),rest=d.projets.slice(3);
      ph='<div class="popup-proj">';
      f3.forEach(p=>{ph+='<div class="popup-proj-item"><span class="popup-proj-name">'+p.nom+'</span><br><span class="popup-proj-amount">'+fmt(p.montant)+'</span> \u00b7 '+(p.demarche_short||'')+'</div>';});
      if(rest.length>0){
        ph+='<div id="'+uid+'" class="popup-extra">';
        rest.forEach(p=>{ph+='<div class="popup-proj-item"><span class="popup-proj-name">'+p.nom+'</span><br><span class="popup-proj-amount">'+fmt(p.montant)+'</span> \u00b7 '+(p.demarche_short||'')+'</div>';});
        ph+='</div>';
        ph+='<button class="popup-toggle" onclick="var el=document.getElementById(\''+uid+'\');var o=el.classList.toggle(\'open\');this.textContent=o?\'▲ Replier\':\'▼ '+rest.length+' autres projets\'">▼ '+rest.length+' autres projets</button>';
      }
      ph+='</div>';
    }
    const habLine='';
    const evolLine=buildEvolutionHtml(d.code);
    circle.bindPopup(
      '<div class="popup-title">'+d.commune+'</div>'+
      '<div class="popup-dept">'+d.dept+' ('+d.code_dept+')'+(d.population?' · pop. '+d.population.toLocaleString('fr-FR'):'')+'</div>'+
      '<div class="popup-stat"><span class="popup-stat-label">Projets</span><span class="popup-stat-value">'+d.count+'</span></div>'+
      '<div class="popup-stat"><span class="popup-stat-label">Montant total</span><span class="popup-stat-value">'+fmt(d.montant)+'</span></div>'+
      habLine+
      '<div class="popup-stat"><span class="popup-stat-label">Mesure principale</span><span class="popup-stat-value" style="color:'+color+'">'+d.demarche_short+'</span></div>'+
      evolLine+ph,{maxWidth:320});
    circle.on('mouseover',function(){this.setStyle({fillOpacity:0.8,weight:2.5});});
    circle.on('mouseout',function(){this.setStyle({fillOpacity:0.5,weight:1.5});});
    circles.push(circle);
  });
  updateStats(filtered);
}

function updateStats(f){
  const tm=f.reduce((s,d)=>s+d.montant,0),tp=f.reduce((s,d)=>s+d.count,0),tc=f.length,tk=tp>0?tm/tp:0;
  const totalPop=f.reduce((s,d)=>s+(d.population||0),0);
  const t5=[...f].sort((a,b)=>b.montant-a.montant).slice(0,5);
  // Aggregate by mesure from projets
  const mesAgg={};
  f.forEach(d=>{if(d.projets)d.projets.forEach(p=>{const m=p.demarche_short||'Autre';mesAgg[m]=(mesAgg[m]||0)+p.montant;});});
  const mesArr=Object.entries(mesAgg).sort((a,b)=>b[1]-a[1]);
  // Build donut SVG arcs
  const R=38,CX=50,CY=50,C=2*Math.PI*R;
  let offset=0,arcs='',legend='';
  mesArr.forEach(([name,val])=>{
    const pct=tm>0?val/tm:0,len=pct*C,color=MESURE_COLORS[name]||'#999';
    arcs+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="none" stroke="'+color+'" stroke-width="12" stroke-dasharray="'+len.toFixed(1)+' '+(C-len).toFixed(1)+'" stroke-dashoffset="'+(-offset).toFixed(1)+'"/>';
    offset+=len;
    legend+='<div style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:8px;height:8px;border-radius:2px;background:'+color+';flex-shrink:0"></span><span style="flex:1;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</span><span style="color:#888;flex-shrink:0">'+(pct*100).toFixed(1)+'%</span></div>';
  });
  const donutHtml='<div class="stat-sep"></div><div class="stat-sub">Répartition par mesure</div>'+
    '<div style="position:relative;width:140px;height:140px;margin:4px auto 8px">'+
    '<svg viewBox="0 0 100 100" style="width:100%;height:100%;transform:rotate(-90deg)">'+arcs+'</svg>'+
    '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">'+
    '<div style="font-size:15px;font-weight:700;color:#000091">'+fmt(tm)+'</div>'+
    '<div style="font-size:9px;color:#888">total</div></div></div>'+
    '<div style="display:flex;flex-direction:column;gap:2px">'+legend+'</div>';
  const isHab=displayMode==='habitant';
  // Dept aggregation for €/hab view
  let bottomHtml='';
  if(isHab){
    const deptAgg={};
    f.forEach(d=>{
      if(!deptAgg[d.code_dept]) deptAgg[d.code_dept]={montant:0,pop:0,count:0,communes:0};
      deptAgg[d.code_dept].montant+=d.montant;
      deptAgg[d.code_dept].pop+=(d.population||0);
      deptAgg[d.code_dept].count+=d.count;
      deptAgg[d.code_dept].communes++;
    });
    const deptArr=Object.entries(deptAgg).map(([code,v])=>({
      code,name:DEPT_NAMES[code]||code,montant:v.montant,pop:v.pop,
      hab:v.pop>0?v.montant/v.pop:0,count:v.count,communes:v.communes
    })).sort((a,b)=>b.hab-a.hab);
    const maxHab=deptArr.length?Math.max(...deptArr.map(d=>d.hab)):1;
    bottomHtml='<div class="stat-sep"></div><div class="stat-sub">€ / habitant par département</div>';
    deptArr.forEach(d=>{
      const pct=maxHab>0?(d.hab/maxHab*100):0;
      bottomHtml+='<div style="margin-bottom:8px">'+
        '<div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px">'+
        '<span style="color:#333;font-weight:600">'+d.code+' '+d.name+'</span>'+
        '<span style="color:#000091;font-weight:700">'+Math.round(d.hab)+' €/hab</span></div>'+
        '<div style="background:#eee;border-radius:3px;height:8px;overflow:hidden">'+
        '<div style="background:#000091;height:100%;width:'+pct.toFixed(1)+'%;border-radius:3px;transition:width .3s"></div></div>'+
        '<div style="font-size:10px;color:#888;margin-top:1px">'+fmt(d.montant)+' · '+d.count+' projets · '+d.communes+' communes</div>'+
        '</div>';
    });
  } else {
    bottomHtml='<div class="stat-sep"></div><div class="stat-sub">Top 5 communes</div>'+
      t5.map((d,i)=>'<div class="stat-row"><span class="stat-label">'+(i+1)+'. '+d.commune+'</span><span class="stat-value" style="font-size:12px;">'+fmt(d.montant)+'</span></div>').join('')+
      '<div class="legend-sizes"><div class="legend-size-item"><div class="legend-size-circle" style="width:8px;height:8px;"></div><div class="legend-size-label">&lt;100k</div></div><div class="legend-size-item"><div class="legend-size-circle" style="width:18px;height:18px;"></div><div class="legend-size-label">~500k</div></div><div class="legend-size-item"><div class="legend-size-circle" style="width:32px;height:32px;"></div><div class="legend-size-label">&gt;5M</div></div></div>';
  }
  document.getElementById('statsContent').innerHTML=
    '<div class="stat-row"><span class="stat-label">Enveloppe</span><span class="stat-value">'+fmt(tm)+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">Projets</span><span class="stat-value">'+tp+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">Communes</span><span class="stat-value">'+tc+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">Ticket moyen</span><span class="stat-value">'+fmt(tk)+'</span></div>'+
    donutHtml+bottomHtml;
}

// Export CSV
function exportCSV(){
  const filtered=DATA.filter(d=>activeDepts.has(d.code_dept)&&activeMesures.has(d.demarche_short));
  const yr=currentYear==='both'?'2023-2024':String(currentYear);
  let csv='\ufeff"Code INSEE","Commune","Département","Code dept","Projets","Montant (€)","Population","€/habitant","Mesure principale"\n';
  filtered.sort((a,b)=>b.montant-a.montant).forEach(d=>{
    const hab=d.population>0?(d.montant/d.population).toFixed(0):'';
    csv+='"'+d.code+'","'+d.commune+'","'+d.dept+'","'+d.code_dept+'",'+d.count+','+d.montant.toFixed(2)+','+(d.population||'')+','+hab+',"'+d.demarche_short+'"\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='fonds_vert_paca_'+yr+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

// Full-text project search
const searchInput=document.getElementById('searchInput'),searchResults=document.getElementById('searchResults');
function buildSearchIndex(){
  const idx=[];
  DATA.forEach(d=>{d.projets.forEach(p=>{
    idx.push({nom:p.nom,montant:p.montant,demarche:p.demarche_short,commune:d.commune,code_dept:d.code_dept,dept:d.dept,lat:d.lat,lng:d.lng,code:d.code,
      _s:(p.nom+' '+d.commune+' '+p.demarche_short+' '+(d.dept||'')).toLowerCase()});
  });});
  return idx;
}
let searchIdx=buildSearchIndex();
function hlMatch(text,q){
  if(!q||!text)return text||'';
  try{const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return text.replace(re,'<mark style="background:#fff3cd;padding:0 1px;border-radius:2px">$1</mark>');}
  catch(e){return text;}
}
searchInput.addEventListener('input',function(){
  const q=this.value.trim().toLowerCase();
  searchResults.innerHTML='';
  if(q.length<2){searchResults.style.display='none';return;}
  const matches=searchIdx.filter(p=>p._s.includes(q)).sort((a,b)=>b.montant-a.montant).slice(0,15);
  if(!matches.length){searchResults.innerHTML='<div style="padding:8px 10px;font-size:11px;color:#888">Aucun résultat</div>';var r0=searchInput.getBoundingClientRect();searchResults.style.top=(r0.bottom+2)+'px';searchResults.style.left=r0.left+'px';searchResults.style.display='block';return;}
  const totalM=matches.reduce((s,p)=>s+p.montant,0);
  const header=document.createElement('div');
  header.style.cssText='padding:6px 10px;font-size:11px;color:#666;border-bottom:1px solid #ddd;background:#f8f8f8';
  header.innerHTML='<b>'+matches.length+'</b> projet'+(matches.length>1?'s':'')+' \u00b7 <b style="color:#000091">'+fmt(totalM)+'</b>';
  searchResults.appendChild(header);
  matches.forEach(p=>{
    const div=document.createElement('div');
    div.style.cssText='padding:6px 10px;font-size:11px;cursor:pointer;border-bottom:1px solid #f0f0f0;color:#333';
    div.innerHTML='<div style="margin-bottom:2px">'+hlMatch(p.nom.substring(0,80),q)+'</div>'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
      '<span style="color:#888">'+hlMatch(p.commune,q)+' ('+p.code_dept+') \u00b7 '+p.demarche+'</span>'+
      '<span style="color:#000091;font-weight:600;white-space:nowrap;margin-left:6px">'+fmt(p.montant)+'</span></div>'+
      '';
    div.addEventListener('mouseenter',function(){this.style.background='#f0f0f5';});
    div.addEventListener('mouseleave',function(){this.style.background='#fff';});
    div.addEventListener('click',function(){
      map.setView([p.lat,p.lng],13);
      var c=circles.find(function(ci){var ll=ci.getLatLng();return Math.abs(ll.lat-p.lat)<0.001&&Math.abs(ll.lng-p.lng)<0.001;});
      if(c)c.openPopup();
      searchResults.style.display='none';
    });
    searchResults.appendChild(div);
  });
  var rect=searchInput.getBoundingClientRect();
  searchResults.style.top=(rect.bottom+2)+'px';
  searchResults.style.left=rect.left+'px';
  searchResults.style.display='block';
});
document.addEventListener('click',function(e){if(!searchInput.contains(e.target)&&!searchResults.contains(e.target))searchResults.style.display='none';});

// Merge 2023+2024 by code commune
function mergeData(d1,d2){
  const m=new Map();
  d1.forEach(d=>{
    m.set(d.code,{lat:d.lat,lng:d.lng,commune:d.commune,code:d.code,dept:d.dept,code_dept:d.code_dept,
      count:d.count,montant:d.montant,population:d.population,projets:d.projets.map(p=>({nom:p.nom,montant:p.montant,demarche_short:p.demarche_short}))});
  });
  d2.forEach(d=>{
    if(m.has(d.code)){
      const e=m.get(d.code);
      e.count+=d.count;e.montant+=d.montant;
      e.population=Math.max(e.population||0,d.population||0);
      d.projets.forEach(p=>e.projets.push({nom:p.nom,montant:p.montant,demarche_short:p.demarche_short}));
    }else{
      m.set(d.code,{lat:d.lat,lng:d.lng,commune:d.commune,code:d.code,dept:d.dept,code_dept:d.code_dept,
        count:d.count,montant:d.montant,population:d.population,projets:d.projets.map(p=>({nom:p.nom,montant:p.montant,demarche_short:p.demarche_short}))});
    }
  });
  m.forEach(d=>{
    const byM={};d.projets.forEach(p=>{byM[p.demarche_short]=(byM[p.demarche_short]||0)+p.montant;});
    let top='',mx=0;for(const[k,v]of Object.entries(byM))if(v>mx){mx=v;top=k;}
    d.demarche_short=top;d.top_demarche=top;
    d.projets.sort((a,b)=>b.montant-a.montant);
  });
  return Array.from(m.values()).sort((a,b)=>b.montant-a.montant);
}
const DATA_BOTH=mergeData(DATA_2023,DATA_2024);
DATA=DATA_BOTH;
searchIdx=buildSearchIndex();
renderCircles();

// Year switcher
let currentYear='both';
function switchYear(year){
  if(year===currentYear)return;
  currentYear=year;
  DATA=year===2023?DATA_2023:year===2024?DATA_2024:DATA_BOTH;
  document.getElementById('btn2023').classList.toggle('active',year===2023);
  document.getElementById('btn2024').classList.toggle('active',year===2024);
  document.getElementById('btnBoth').classList.toggle('active',year==='both');
  const label=year==='both'?'2023+2024':String(year);
  document.querySelector('.header-bar h1').textContent='Fonds Vert '+label+' \u2014 Provence-Alpes-C\u00f4te d\u2019Azur';
  const tm=DATA.reduce((s,d)=>s+d.montant,0),tp=DATA.reduce((s,d)=>s+d.count,0);
  document.getElementById('headerStats').textContent=tp+' projets \u00b7 '+(tm/1e6).toFixed(1).replace('.',',')+' M\u20ac \u00b7 '+DATA.length+' communes';
  activeDepts=new Set(Object.keys(DEPT_NAMES));
  activeMesures=new Set(Object.keys(MESURE_COLORS));
  document.querySelectorAll('#deptFilters .dept-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('#deptFilters .dept-btn').classList.add('active');
  document.querySelectorAll('#mesureFilters input[type="checkbox"]').forEach(cb=>cb.checked=true);
  searchIdx=buildSearchIndex();
  renderCircles();
  map.fitBounds(pacaBounds,{padding:[0,270]});
}
