<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fonds Vert 2024 — Cartographie des projets en Provence-Alpes-Côte d'Azur</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.5}
.skip-link{position:absolute;top:-100px;left:8px;z-index:10000;background:#000091;color:#fff;padding:8px 16px;font-size:14px;font-weight:600;text-decoration:none;border-radius:0 0 4px 4px}
.skip-link:focus{top:0}
#map{width:100%;height:100vh}
.header-bar{position:absolute;top:0;left:0;right:0;z-index:1000;background:rgba(255,255,255,.96);backdrop-filter:blur(8px);border-bottom:3px solid #000091;padding:12px 24px;display:flex;align-items:center;gap:16px;pointer-events:none}
.header-bar h1{font-size:18px;font-weight:700;color:#000091;letter-spacing:-0.3px}
.header-bar .subtitle{font-size:13px;color:#666;font-weight:400}
.filters-panel{position:absolute;top:64px;left:16px;z-index:1000;background:#fff;border:1px solid #ddd;border-radius:6px;padding:14px;width:260px;max-height:calc(100vh - 90px);overflow-y:auto;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.filters-panel h2{font-size:13px;font-weight:700;color:#000091;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid #000091}
.filter-section{margin-bottom:14px}
.filter-section h3{font-size:12px;font-weight:600;color:#333;margin-bottom:6px}
.filter-group{display:flex;flex-direction:column;gap:3px}
.dept-btn{display:block;width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#333;font-size:12px;font-family:inherit;cursor:pointer;text-align:left;transition:all .15s}
.dept-btn:hover{background:#f0f0f0;border-color:#000091}
.dept-btn:focus{outline:2px solid #000091;outline-offset:1px}
.dept-btn.active{background:#000091;color:#fff;border-color:#000091}
.filter-cb{display:flex;align-items:center;gap:6px;padding:4px 6px;border-radius:4px;cursor:pointer;transition:background .15s;font-size:12px;color:#333}
.filter-cb:hover{background:#f0f0f0}
.filter-cb input[type="checkbox"]{width:16px;height:16px;accent-color:#000091;cursor:pointer;flex-shrink:0}
.filter-cb .color-swatch{width:10px;height:10px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15)}
.filter-reset{display:inline-block;margin-top:4px;padding:4px 10px;background:#f5f5f5;border:1px solid #ccc;border-radius:4px;font-size:11px;color:#555;cursor:pointer;font-family:inherit}
.filter-reset:hover{background:#e8e8e8}
.stats-panel{position:absolute;top:64px;right:16px;z-index:1000;background:#fff;border:1px solid #ddd;border-radius:6px;padding:14px;width:230px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.stats-panel h2{font-size:13px;font-weight:700;color:#000091;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #000091}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.stat-label{font-size:12px;color:#555}
.stat-value{font-size:14px;font-weight:700;color:#000091}
.stat-sep{border-top:1px solid #eee;margin:8px 0}
.stat-sub{font-size:11px;color:#888;margin-bottom:4px}
.legend-sizes{display:flex;align-items:flex-end;gap:12px;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.legend-size-item{text-align:center}
.legend-size-circle{border:2px solid #888;border-radius:50%;margin:0 auto 2px;background:transparent}
.legend-size-label{font-size:10px;color:#888}
.leaflet-popup-content-wrapper{background:#fff!important;border-radius:6px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important;border:1px solid #ddd!important}
.leaflet-popup-tip{background:#fff!important}
.leaflet-popup-content{color:#1a1a1a!important;font-family:inherit!important;margin:12px 16px!important;line-height:1.5!important}
.popup-title{font-size:15px;font-weight:700;color:#000091;margin-bottom:4px}
.popup-dept{font-size:12px;color:#666;margin-bottom:8px}
.popup-stat{display:flex;justify-content:space-between;margin-bottom:3px}
.popup-stat-label{font-size:12px;color:#666}
.popup-stat-value{font-size:13px;font-weight:700;color:#000091}
.popup-proj{font-size:11px;color:#555;margin-top:8px;padding-top:8px;border-top:1px solid #eee}
.popup-proj-item{margin-bottom:5px}
.popup-proj-name{color:#333}
.popup-proj-amount{color:#e1000f;font-weight:600}
.popup-toggle{display:inline-block;margin-top:6px;padding:3px 8px;background:#f0f0f5;border:1px solid #ddd;border-radius:4px;font-size:11px;color:#000091;cursor:pointer;font-family:inherit;font-weight:600;transition:all .15s}
.popup-toggle:hover{background:#e0e0f0;border-color:#000091}
.popup-extra{display:none}
.popup-extra.open{display:block}
.leaflet-control-zoom a{background:#fff!important;color:#333!important;border-color:#ddd!important}
.leaflet-control-zoom a:hover{background:#f0f0f0!important}
.leaflet-control-attribution{background:rgba(255,255,255,.85)!important;font-size:10px!important}
.dept-label{background:none!important;border:none!important;box-shadow:none!important;font-size:11px;font-weight:600;color:#555;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff,1px -1px 2px #fff,-1px 1px 2px #fff;white-space:nowrap}
@media(max-width:768px){.filters-panel{width:200px;padding:10px;font-size:11px}.stats-panel{width:180px;padding:10px}.header-bar h1{font-size:15px}}
</style>
</head>
<body>
<a href="#map" class="skip-link">Aller au contenu principal</a>
<header class="header-bar" role="banner">
  <h1>Fonds Vert 2024 — Provence-Alpes-Côte d'Azur</h1>
  <span class="subtitle">568 projets · 138,1 M€ · 276 communes</span>
</header>
<nav class="filters-panel" role="navigation" aria-label="Filtres de la carte">
  <h2>Filtres</h2>
  <div class="filter-section" style="margin-bottom:14px"><h3 style="font-size:12px;font-weight:600;color:#333;margin-bottom:6px">Rechercher une commune</h3><div style="position:relative"><input type="text" id="searchInput" placeholder="ex : Manosque, Gap..." autocomplete="off" style="width:100%;padding:6px 10px 6px 28px;font-size:12px;border:1px solid #ddd;border-radius:4px;background:#fff;color:#333;font-family:inherit"/><svg style="position:absolute;left:8px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><div id="searchResults" style="display:none;position:absolute;z-index:2000;background:#fff;border:1px solid #ddd;border-radius:4px;margin-top:2px;max-height:200px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);width:232px"></div></div>
  <div class="filter-section"><h3 id="dept-filter-label">Départements</h3><div class="filter-group" role="group" aria-labelledby="dept-filter-label" id="deptFilters" style="gap:4px;"></div></div>
  <div class="filter-section"><h3 id="mesure-filter-label">Mesures</h3><div class="filter-group" role="group" aria-labelledby="mesure-filter-label" id="mesureFilters"></div><button class="filter-reset" onclick="resetMesures()" aria-label="Réinitialiser les filtres de mesures">Tout afficher</button></div>
</nav>
<main><div id="map" role="application" aria-label="Carte interactive des projets Fonds Vert en PACA" tabindex="0"></div></main>
<aside class="stats-panel" role="complementary" aria-label="Statistiques"><h2>Statistiques</h2><div id="statsContent"></div></aside>
<script src="data.js"></script>
<script>
const MESURE_COLORS={"Rénov. énergétique":"#2f5496","Recyclage foncier":"#bf8f00","Renaturation":"#2e7d32","Éclairage public":"#7b1fa2","PAPI/GEMAPI":"#c62828","ZFE mobilité":"#ad1457","Incendies de forêt":"#e65100","Terr. Industrie":"#00838f","Biodéchets":"#558b2f","Covoiturage":"#00695c","Mobilités rurales":"#4527a0","Ingénierie":"#546e7a","Risques montagne":"#6a1b9a"};
const DEPT_NAMES={"04":"Alpes-de-Haute-Provence","05":"Hautes-Alpes","06":"Alpes-Maritimes","13":"Bouches-du-Rhône","83":"Var","84":"Vaucluse"};
const DEPT_CENTROIDS={"04":[44.05,6.2],"05":[44.65,6.3],"06":[43.85,7.1],"13":[43.45,5.1],"83":[43.4,6.3],"84":[44.05,5.1]};
let activeDepts=new Set(Object.keys(DEPT_NAMES)),activeMesures=new Set(Object.keys(MESURE_COLORS)),circles=[],deptLabels=[];
function fmt(n){if(n>=1e6)return(n/1e6).toFixed(1).replace('.',',')+"\u00a0M€";if(n>=1e3)return(n/1e3).toFixed(0)+"\u00a0k€";return Math.round(n)+"\u00a0€";}
function getRadius(m){return 4+28*Math.pow(m/DATA[0].montant,0.4);}
function getColor(m){return MESURE_COLORS[m]||"#999";}
const pacaBounds=L.latLngBounds([[42.9,4.15],[45.1,7.7]]);
const map=L.map('map',{zoomControl:false,attributionControl:true,maxBounds:pacaBounds.pad(0.05),maxBoundsViscosity:1.0,minZoom:7,maxZoom:15}).fitBounds(pacaBounds,{padding:[0,270]});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a> · Données : <a href="https://www.data.gouv.fr">data.gouv.fr</a>',maxZoom:18,subdomains:'abcd'}).addTo(map);
L.geoJSON(DEPTS_GEOJSON,{style:{color:'#000091',weight:2,opacity:0.6,fillColor:'transparent',fillOpacity:0,dashArray:'6,3'},onEachFeature:function(f,l){l.bindTooltip(f.properties.nom,{permanent:false,direction:'center',className:'dept-label'});}}).addTo(map);
Object.entries(DEPT_CENTROIDS).forEach(([c,ll])=>{const l=L.marker(ll,{icon:L.divIcon({className:'dept-label',html:DEPT_NAMES[c],iconSize:null}),interactive:false}).addTo(map);deptLabels.push(l);});
map.on('zoomend',function(){const z=map.getZoom();deptLabels.forEach(l=>{if(z>=10)map.removeLayer(l);else if(!map.hasLayer(l))l.addTo(map);});});

function renderCircles(){
  circles.forEach(c=>map.removeLayer(c));circles=[];
  const filtered=DATA.filter(d=>activeDepts.has(d.code_dept)&&activeMesures.has(d.demarche_short));
  [...filtered].sort((a,b)=>a.montant-b.montant).forEach(d=>{
    const color=getColor(d.demarche_short),radius=getRadius(d.montant);
    const circle=L.circleMarker([d.lat,d.lng],{radius,fillColor:color,fillOpacity:0.5,color,weight:1.5,opacity:0.7}).addTo(map);
    let ph='';
    if(d.projets&&d.projets.length>0){
      const uid='proj-'+d.code,f3=d.projets.slice(0,3),rest=d.projets.slice(3);
      ph='<div class="popup-proj">';
      f3.forEach(p=>{ph+='<div class="popup-proj-item"><span class="popup-proj-name">'+p.nom+'</span><br><span class="popup-proj-amount">'+fmt(p.montant)+'</span> · '+(p.demarche_short||'')+'</div>';});
      if(rest.length>0){
        ph+='<div id="'+uid+'" class="popup-extra">';
        rest.forEach(p=>{ph+='<div class="popup-proj-item"><span class="popup-proj-name">'+p.nom+'</span><br><span class="popup-proj-amount">'+fmt(p.montant)+'</span> · '+(p.demarche_short||'')+'</div>';});
        ph+='</div>';
        ph+='<button class="popup-toggle" onclick="var el=document.getElementById(\''+uid+'\');var o=el.classList.toggle(\'open\');this.textContent=o?\'▲ Replier\':\'▼ '+rest.length+' autres projets\'">▼ '+rest.length+' autres projets</button>';
      }
      ph+='</div>';
    }
    circle.bindPopup('<div class="popup-title">'+d.commune+'</div><div class="popup-dept">'+d.dept+' ('+d.code_dept+')'+(d.population?' · pop. '+d.population.toLocaleString('fr-FR'):'')+'</div><div class="popup-stat"><span class="popup-stat-label">Projets</span><span class="popup-stat-value">'+d.count+'</span></div><div class="popup-stat"><span class="popup-stat-label">Montant total</span><span class="popup-stat-value">'+fmt(d.montant)+'</span></div><div class="popup-stat"><span class="popup-stat-label">Mesure principale</span><span class="popup-stat-value" style="color:'+color+'">'+d.demarche_short+'</span></div>'+ph,{maxWidth:320});
    circle.on('mouseover',function(){this.setStyle({fillOpacity:0.8,weight:2.5});});
    circle.on('mouseout',function(){this.setStyle({fillOpacity:0.5,weight:1.5});});
    circles.push(circle);
  });
  updateStats(filtered);
}

function updateStats(f){
  const tm=f.reduce((s,d)=>s+d.montant,0),tp=f.reduce((s,d)=>s+d.count,0),tc=f.length,tk=tp>0?tm/tp:0;
  const t5=[...f].sort((a,b)=>b.montant-a.montant).slice(0,5);
  // Aggregate by mesure from projets
  const mesAgg={};
  f.forEach(d=>{if(d.projets)d.projets.forEach(p=>{const m=p.demarche_short||'Autre';mesAgg[m]=(mesAgg[m]||0)+p.montant;});});
  const mesArr=Object.entries(mesAgg).sort((a,b)=>b[1]-a[1]);
  // Build donut SVG arcs
  const R=38,CX=50,CY=50,C=2*Math.PI*R;
  let offset=0,arcs='',legend='';
  mesArr.forEach(([name,val])=>{
    const pct=tm>0?val/tm:0,len=pct*C,color=MESURE_COLORS[name]||'#999';
    arcs+='<circle cx="'+CX+'" cy="'+CY+'" r="'+R+'" fill="none" stroke="'+color+'" stroke-width="12" stroke-dasharray="'+len.toFixed(1)+' '+(C-len).toFixed(1)+'" stroke-dashoffset="'+(-offset).toFixed(1)+'"/>';
    offset+=len;
    legend+='<div style="display:flex;align-items:center;gap:5px;font-size:11px"><span style="width:8px;height:8px;border-radius:2px;background:'+color+';flex-shrink:0"></span><span style="flex:1;color:#333;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+name+'</span><span style="color:#888;flex-shrink:0">'+(pct*100).toFixed(1)+'%</span></div>';
  });
  const donutHtml='<div class="stat-sep"></div><div class="stat-sub">Répartition par mesure</div>'+
    '<div style="position:relative;width:140px;height:140px;margin:4px auto 8px">'+
    '<svg viewBox="0 0 100 100" style="width:100%;height:100%;transform:rotate(-90deg)">'+arcs+'</svg>'+
    '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center">'+
    '<div style="font-size:15px;font-weight:700;color:#000091">'+fmt(tm)+'</div>'+
    '<div style="font-size:9px;color:#888">total</div></div></div>'+
    '<div style="display:flex;flex-direction:column;gap:2px">'+legend+'</div>';
  document.getElementById('statsContent').innerHTML=
    '<div class="stat-row"><span class="stat-label">Enveloppe</span><span class="stat-value">'+fmt(tm)+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">Projets</span><span class="stat-value">'+tp+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">Communes</span><span class="stat-value">'+tc+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">Ticket moyen</span><span class="stat-value">'+fmt(tk)+'</span></div>'+
    donutHtml+
    '<div class="stat-sep"></div><div class="stat-sub">Top 5 communes</div>'+
    t5.map((d,i)=>'<div class="stat-row"><span class="stat-label">'+(i+1)+'. '+d.commune+'</span><span class="stat-value" style="font-size:12px;">'+fmt(d.montant)+'</span></div>').join('')+
    '<div class="legend-sizes"><div class="legend-size-item"><div class="legend-size-circle" style="width:8px;height:8px;"></div><div class="legend-size-label">&lt;100k</div></div><div class="legend-size-item"><div class="legend-size-circle" style="width:18px;height:18px;"></div><div class="legend-size-label">~500k</div></div><div class="legend-size-item"><div class="legend-size-circle" style="width:32px;height:32px;"></div><div class="legend-size-label">&gt;5M</div></div></div>';
}

const dc=document.getElementById('deptFilters');
const ab=document.createElement('button');ab.className='dept-btn active';ab.textContent='Tous les départements';
ab.addEventListener('click',()=>{activeDepts=new Set(Object.keys(DEPT_NAMES));document.querySelectorAll('#deptFilters .dept-btn').forEach(b=>b.classList.remove('active'));ab.classList.add('active');renderCircles();map.fitBounds(pacaBounds,{padding:[0,270]});});
dc.appendChild(ab);
Object.entries(DEPT_NAMES).sort((a,b)=>a[1].localeCompare(b[1],'fr')).forEach(([code,name])=>{const btn=document.createElement('button');btn.className='dept-btn';btn.textContent=code+' – '+name;btn.addEventListener('click',()=>{activeDepts=new Set([code]);document.querySelectorAll('#deptFilters .dept-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderCircles();const pts=DATA.filter(d=>d.code_dept===code&&activeMesures.has(d.demarche_short));if(pts.length){map.fitBounds(L.latLngBounds(pts.map(d=>[d.lat,d.lng])),{padding:[60,60]});}});dc.appendChild(btn);});
const mc=document.getElementById('mesureFilters');
Object.entries(MESURE_COLORS).forEach(([n,c])=>{const l=document.createElement('label');l.className='filter-cb';const cb=document.createElement('input');cb.type='checkbox';cb.checked=true;cb.addEventListener('change',()=>{if(cb.checked)activeMesures.add(n);else activeMesures.delete(n);renderCircles();});const sw=document.createElement('span');sw.className='color-swatch';sw.style.background=c;l.appendChild(cb);l.appendChild(sw);l.appendChild(document.createTextNode(n));mc.appendChild(l);});
function resetMesures(){activeMesures=new Set(Object.keys(MESURE_COLORS));document.querySelectorAll('#mesureFilters input[type="checkbox"]').forEach(cb=>cb.checked=true);renderCircles();}
renderCircles();

// Search
const searchInput=document.getElementById('searchInput'),searchResults=document.getElementById('searchResults');
searchInput.addEventListener('input',function(){const q=this.value.trim().toLowerCase();searchResults.innerHTML='';if(q.length<2){searchResults.style.display='none';return;}const matches=DATA.filter(d=>d.commune.toLowerCase().includes(q)).slice(0,10);if(!matches.length){searchResults.style.display='none';return;}matches.forEach(d=>{const div=document.createElement('div');div.style.cssText='padding:6px 10px;font-size:12px;cursor:pointer;border-bottom:1px solid #eee;color:#333';div.textContent=d.commune+' ('+d.code_dept+') — '+fmt(d.montant);div.addEventListener('mouseenter',()=>div.style.background='#f0f0f5');div.addEventListener('mouseleave',()=>div.style.background='#fff');div.addEventListener('click',()=>{map.setView([d.lat,d.lng],13);const c=circles.find(ci=>{const ll=ci.getLatLng();return Math.abs(ll.lat-d.lat)<0.001&&Math.abs(ll.lng-d.lng)<0.001;});if(c)c.openPopup();searchInput.value=d.commune;searchResults.style.display='none';});searchResults.appendChild(div);});searchResults.style.display='block';});
document.addEventListener('click',function(e){if(!searchInput.contains(e.target)&&!searchResults.contains(e.target))searchResults.style.display='none';});
</script>
</body>
</html>
