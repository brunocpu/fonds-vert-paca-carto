const DEMARCHE_COLORS = {
  "Rénov. énergétique": "#3b82f6",
  "Recyclage foncier": "#f59e0b",
  "Renaturation": "#10b981",
  "Éclairage public": "#a78bfa",
  "PAPI/GEMAPI": "#ef4444",
  "ZFE mobilité": "#ec4899",
  "Incendies forêt": "#f97316",
  "Terr. Industrie": "#06b6d4",
  "Biodéchets": "#84cc16",
  "Covoiturage": "#14b8a6",
  "Mobilités rurales": "#8b5cf6",
  "Ingénierie": "#64748b",
  "Risques montagne": "#d946ef",
};
const DEFAULT_COLOR = "#6b7280";

const DEPT_FILTER = {
  "all": "Tous",
  "04": "04 - AHP",
  "05": "05 - H-Alpes",
  "06": "06 - A-Mar",
  "13": "13 - BdR",
  "83": "83 - Var",
  "84": "84 - Vaucluse",
};

function fmt(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + " M€";
  if (n >= 1e3) return (n / 1e3).toFixed(0) + " k€";
  return Math.round(n) + " €";
}

function getRadius(montant) {
  const min = 4, max = 35;
  const maxMontant = DATA[0].montant;
  return min + (max - min) * Math.pow(montant / maxMontant, 0.4);
}

function getColor(demarche) {
  return DEMARCHE_COLORS[demarche] || DEFAULT_COLOR;
}

// Init map
const map = L.map('map', {
  zoomControl: true,
  attributionControl: true,
}).setView([43.85, 6.2], 8);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 18,
}).addTo(map);

// Circles layer
let circles = [];
let activeFilter = "all";

function renderCircles(deptFilter) {
  circles.forEach(c => map.removeLayer(c));
  circles = [];

  const filtered = deptFilter === "all" ? DATA : DATA.filter(d => d.code_dept === deptFilter);
  
  // Sort ascending so big circles are drawn last (on top)
  const sorted = [...filtered].sort((a, b) => a.montant - b.montant);

  sorted.forEach(d => {
    const color = getColor(d.demarche_short);
    const radius = getRadius(d.montant);

    const circle = L.circleMarker([d.lat, d.lng], {
      radius: radius,
      fillColor: color,
      fillOpacity: 0.55,
      color: color,
      weight: 1.5,
      opacity: 0.8,
    }).addTo(map);

    let projetsHtml = '';
    if (d.projets && d.projets.length > 0) {
      projetsHtml = '<div class="popup-proj">';
      d.projets.forEach(p => {
        projetsHtml += '<div class="popup-proj-item"><span class="popup-proj-name">' + p.nom + '</span><br><span class="popup-proj-amount">' + fmt(p.montant) + '</span> · ' + (p.demarche_short || '') + '</div>';
      });
      if (d.count > 3) projetsHtml += '<div style="color:#64748b;font-style:italic;">+ ' + (d.count - 3) + ' autres projets</div>';
      projetsHtml += '</div>';
    }

    circle.bindPopup(
      '<div class="popup-title">' + d.commune + '</div>' +
      '<div class="popup-dept">' + d.dept + ' (' + d.code_dept + ')' + (d.population ? ' · pop. ' + d.population.toLocaleString() : '') + '</div>' +
      '<div class="popup-stat"><span class="popup-stat-label">Projets</span><span class="popup-stat-value">' + d.count + '</span></div>' +
      '<div class="popup-stat"><span class="popup-stat-label">Montant total</span><span class="popup-stat-value">' + fmt(d.montant) + '</span></div>' +
      '<div class="popup-stat"><span class="popup-stat-label">Catégorie principale</span><span class="popup-stat-value" style="color:' + color + '">' + d.demarche_short + '</span></div>' +
      projetsHtml,
      { maxWidth: 320 }
    );

    circle.on('mouseover', function() { this.setStyle({ fillOpacity: 0.85, weight: 2.5 }); });
    circle.on('mouseout', function() { this.setStyle({ fillOpacity: 0.55, weight: 1.5 }); });

    circles.push(circle);
  });

  updateStats(filtered);
}

function updateStats(filtered) {
  const totalMontant = filtered.reduce((s, d) => s + d.montant, 0);
  const totalProjets = filtered.reduce((s, d) => s + d.count, 0);
  const totalCommunes = filtered.length;
  const ticketMoyen = totalProjets > 0 ? totalMontant / totalProjets : 0;

  // Top 5 communes
  const top5 = [...filtered].sort((a, b) => b.montant - a.montant).slice(0, 5);

  document.getElementById('statsPanel').innerHTML =
    '<h3>Statistiques</h3>' +
    '<div class="stat-row"><span class="stat-label">Enveloppe</span><span class="stat-value">' + fmt(totalMontant) + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Projets</span><span class="stat-value">' + totalProjets + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Communes</span><span class="stat-value">' + totalCommunes + '</span></div>' +
    '<div class="stat-row"><span class="stat-label">Ticket moyen</span><span class="stat-value">' + fmt(ticketMoyen) + '</span></div>' +
    '<div style="border-top:1px solid #1e293b;margin:10px 0;"></div>' +
    '<div style="font-size:11px;color:#64748b;margin-bottom:6px;">Top 5 communes</div>' +
    top5.map((d, i) =>
      '<div class="stat-row"><span class="stat-label">' + (i+1) + '. ' + d.commune + '</span><span class="stat-value" style="font-size:12px;">' + fmt(d.montant) + '</span></div>'
    ).join('');
}

// Dept filter buttons
const filterBar = document.getElementById('filterBar');
Object.entries(DEPT_FILTER).forEach(([code, label]) => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (code === 'all' ? ' active' : '');
  btn.textContent = label;
  btn.onclick = () => {
    activeFilter = code;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderCircles(code);
    if (code !== 'all') {
      const pts = DATA.filter(d => d.code_dept === code);
      if (pts.length) {
        const bounds = L.latLngBounds(pts.map(d => [d.lat, d.lng]));
        map.fitBounds(bounds, { padding: [60, 60] });
      }
    } else {
      map.setView([43.85, 6.2], 8);
    }
  };
  filterBar.appendChild(btn);
});

// Legend
const demarches = Object.entries(DEMARCHE_COLORS);
let legendHtml = '<h3>Démarches</h3>';
demarches.forEach(([name, color]) => {
  legendHtml += '<div class="legend-item"><div class="legend-dot" style="background:' + color + '"></div><span class="legend-label">' + name + '</span></div>';
});
legendHtml += '<div class="legend-sep"></div>';
legendHtml += '<h3 style="margin-bottom:8px;">Taille = montant</h3>';
legendHtml += '<div class="size-row"><div class="size-circle" style="width:10px;height:10px;"></div><span class="legend-label">< 100k€</span></div>';
legendHtml += '<div class="size-row"><div class="size-circle" style="width:20px;height:20px;"></div><span class="legend-label">~500k€</span></div>';
legendHtml += '<div class="size-row"><div class="size-circle" style="width:35px;height:35px;"></div><span class="legend-label">> 10M€</span></div>';
document.getElementById('legend').innerHTML = legendHtml;

// Initial render
renderCircles("all");
</script>
</body>
</html>
